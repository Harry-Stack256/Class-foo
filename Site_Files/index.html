<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .page-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Welcome Header */
        .welcome-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-in;
        }

        .welcome-header h1 {
            font-size: 36px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            margin-bottom: 5px;
        }

        .welcome-header .placeholder {
            font-size: 28px;
            color: #ff6b9d;
            font-weight: bold;
        }

        /* Top Section with Profile and Create Event Button */
        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .profile-icon-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .profile-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 107, 157, 0.3);
        }

        .profile-greeting {
            font-size: 18px;
            color: #333;
        }

        .profile-greeting .name {
            font-weight: bold;
            color: #ff6b9d;
        }

        .create-event-btn {
            background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 10px rgba(255, 107, 157, 0.3);
        }

        .create-event-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 107, 157, 0.4);
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        /* Profile Info Card */
        .profile-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        .profile-card h2 {
            color: #ff6b9d;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #ffecd2;
            padding-bottom: 10px;
        }

        .info-group {
            margin-bottom: 18px;
        }

        .info-group label {
            display: block;
            color: #666;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .info-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffecd2;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            transition: border-color 0.3s;
        }

        .info-group input:focus {
            outline: none;
            border-color: #ff6b9d;
            box-shadow: 0 0 8px rgba(255, 107, 157, 0.2);
        }

        .info-group input::placeholder {
            color: #ccc;
        }

        /* Restrictions Card */
        .restrictions-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .restrictions-card h2 {
            color: #ff6b9d;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #ffecd2;
            padding-bottom: 10px;
        }

        .restrictions-section {
            margin-bottom: 30px;
        }

        .restrictions-section h3 {
            color: #c06c84;
            font-size: 14px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #ff6b9d;
        }

        .checkbox-item label {
            cursor: pointer;
            font-size: 14px;
            color: #333;
            user-select: none;
        }

        .custom-restrictions {
            margin-top: 15px;
        }

        .custom-restrictions label {
            display: block;
            color: #666;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .custom-restrictions textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffecd2;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s;
        }

        .custom-restrictions textarea:focus {
            outline: none;
            border-color: #ff6b9d;
            box-shadow: 0 0 8px rgba(255, 107, 157, 0.2);
        }

        .custom-restrictions textarea::placeholder {
            color: #ccc;
        }

        .save-btn {
            background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 15px;
            width: 100%;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .top-section {
                flex-direction: column;
                text-align: center;
            }

            .profile-icon-section {
                flex-direction: column;
            }

            .checkbox-group {
                grid-template-columns: 1fr;
            }

            .welcome-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <!-- Welcome Header -->
        <div class="welcome-header">
            <h1>Welcome to <span class="placeholder">[Product Name]</span></h1>
        </div>

        <!-- Top Section with Profile and Create Event -->
        <div class="top-section">
            <div class="profile-icon-section">
                <div class="profile-icon">👤</div>
                <div class="profile-greeting">
                    Hello, <span class="name">Friend!</span><br>
                    <span style="color: #999; font-size: 14px;">Join our sweet community</span>
                </div>
            </div>
            <a href="createEvent.html" class="create-event-btn">+ Create Event</a>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Profile Info Card -->
            <div class="profile-card">
                <h2>Your Profile</h2>

                <div class="info-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your full name">
                </div>

                <div class="info-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number">
                </div>

                <div class="info-group">
                    <label for="birthday">Birthday</label>
                    <input type="date" id="birthday">
                </div>

                <div class="info-group">
                    <label for="preferences">Preferences</label>
                    <input type="text" id="preferences" placeholder="Share what makes you happy!">
                </div>
            </div>

            <!-- Restrictions Card -->
            <div class="restrictions-card">
                <h2>Diet Restrictions & Preferences</h2>

                <div class="restrictions-section">
                    <h3>Common Restrictions</h3>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="lowSalt" value="low-salt">
                            <label for="lowSalt">Low Salt</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="peanutAllergy" value="peanut-allergy">
                            <label for="peanutAllergy">Peanut Allergy</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="gluten" value="gluten-free">
                            <label for="gluten">Gluten Free</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="dairy" value="dairy-free">
                            <label for="dairy">Dairy Free</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="vegan" value="vegan">
                            <label for="vegan">Vegan</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="vegetarian" value="vegetarian">
                            <label for="vegetarian">Vegetarian</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="nutAllergy" value="nut-allergy">
                            <label for="nutAllergy">Nut Allergy</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="shellfish" value="shellfish-allergy">
                            <label for="shellfish">Shellfish Allergy</label>
                        </div>
                    </div>
                </div>

                <div class="custom-restrictions">
                    <label for="customRestrictions">Add Custom Restrictions</label>
                    <textarea id="customRestrictions" placeholder="Tell us about any other dietary needs or restrictions..."></textarea>
                </div>

                <button class="save-btn">Save Profile</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
